# Qonduit configuration

[nats]
url = "nats://localhost:4222"

[storage]
data_dir = "./data"

[query]
listen_addr = "0.0.0.0:8080"

[ingestion]
# Optional: explicit node address (peer discovery finds nodes automatically)
# node_addr = "1.2.3.4:21841"
# Optional: additional bootstrap nodes
# bootstrap_addrs = ["5.6.7.8:21841"]

[processor]
# Replay all messages from stream start on first run (default: true)
# catch_up = true
# Batch size: auto-scales based on memory and pending messages
# batch_size = 100

[backfill]
# Enable historical backfill (default: false)
# When enabled, connects to Qubic nodes via parallel TCP connections
# and requests historical tick data and transactions.
# enabled = false
# Number of parallel TCP workers (default: 4)
# workers = 4
# Start tick for backfill (0 = start from epoch 1)
# start_tick = 0
# End tick for backfill (0 = auto-detect from node)
# end_tick = 0
# Delay between ticks per worker in ms (0 = no delay)
# tick_delay_ms = 0
