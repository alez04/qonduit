# Qonduit configuration

[nats]
url = "nats://localhost:4222"

[storage]
data_dir = "./data"

[query]
listen_addr = "0.0.0.0:8080"

[ingestion]
# Optional: explicit node address (peer discovery finds nodes automatically)
# node_addr = "1.2.3.4:21841"
# Optional: additional bootstrap nodes
# bootstrap_addrs = ["5.6.7.8:21841"]

[processor]
# Replay all messages from stream start on first run (default: true)
# catch_up = true
# Batch size: auto-scales based on memory and pending messages
# batch_size = 100
